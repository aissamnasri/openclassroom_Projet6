name: CI-CD

on:
  push:
    branches:
      - main
      - develop
      - test-ci
  pull_request:

permissions:
  contents: write
  packages: write

jobs:
  # ============================================================
  # JOB 1 — TEST
  # Détecte le type de projet et exécute les tests
  # ============================================================
  test:
    runs-on: ubuntu-latest
    outputs:
      project_type: ${{ steps.detect.outputs.type }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # FIX : cohérence avec les autres jobs, utile pour git history

      - name: Detect project type
        id: detect
        run: |
          if [ -f package.json ]; then
            echo "type=angular" >> $GITHUB_OUTPUT
          elif [ -f build.gradle ] || [ -f build.gradle.kts ]; then
            echo "type=spring" >> $GITHUB_OUTPUT
          else
            echo "Unsupported project"
            exit 1
          fi

      # ------------------------
      # Angular
      # ------------------------
      - name: Setup Node
        if: steps.detect.outputs.type == 'angular'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Angular dependencies
        if: steps.detect.outputs.type == 'angular'
        run: npm ci

      - name: Run Angular tests
        if: steps.detect.outputs.type == 'angular'
        # FIX : --watch=false indispensable en CI, sinon Karma boucle indéfiniment
        run: npm test -- --watch=false --browsers=ChromeHeadless

      - name: Upload Angular test reports
        if: steps.detect.outputs.type == 'angular'
        uses: actions/upload-artifact@v4
        with:
          name: angular-test-results
          path: test-results/

      # ------------------------
      # Spring
      # ------------------------
      - name: Setup Java
        if: steps.detect.outputs.type == 'spring'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        if: steps.detect.outputs.type == 'spring'
        uses: gradle/actions/setup-gradle@v3

      - name: Run Spring tests
        if: steps.detect.outputs.type == 'spring'
        run: ./gradlew clean test

      - name: Upload Spring test reports
        if: steps.detect.outputs.type == 'spring'
        uses: actions/upload-artifact@v4
        with:
          name: spring-test-results
          path: build/test-results/test

  # ============================================================
  # JOB 2 — RELEASE
  # Génère une release sémantique (main uniquement)
  # ============================================================
  release:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install semantic-release
        run: |
          npm install --no-save \
            semantic-release \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator \
            @semantic-release/changelog \
            @semantic-release/git \
            @semantic-release/github

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

  # ============================================================
  # JOB 3 — BUILD
  # Build et push l'image Docker
  #
  # FIX : dépend de `test` ET `release` (plus uniquement de release)
  # FIX : tourne sur toutes les branches dès que `test` passe,
  #        même si `release` est skippé (branches non-main)
  # ============================================================
  build:
    needs:
      - test
      - release
    # always() permet de continuer même si release est skippé (develop, test-ci)
    # On bloque uniquement si test a échoué
    if: always() && needs.test.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate branch tag
        run: |
          echo "SHA_SHORT=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV
          echo "BRANCH_NAME=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - name: Get latest version
        run: |
          git fetch --tags
          # FIX : fallback sur "0.0.0-<sha>" au lieu de "latest"
          #        pour éviter d'écraser une éventuelle image :latest existante
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0-${SHA_SHORT}")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository }}:${VERSION} \
            -t ghcr.io/${{ github.repository }}:${BRANCH_NAME}-${SHA_SHORT} \
            .

      - name: Push version tag
        run: docker push ghcr.io/${{ github.repository }}:${VERSION}

      - name: Push branch tag
        run: docker push ghcr.io/${{ github.repository }}:${BRANCH_NAME}-${SHA_SHORT}
